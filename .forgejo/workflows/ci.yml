name: ci

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: docker

    container:
      image: kuyoh/vcpkg:2026.02.27-ubuntu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            python3 \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            freeglut3-dev \
            ninja-build \
            cmake

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE=${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=TRUE \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja

      - name: Build
        run: |
          cmake --build build --config Release -j"$(nproc)"

      - name: Test
        run: |
          ctest --test-dir build --output-on-failure
